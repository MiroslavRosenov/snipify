repos:
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
    -   id: check-yaml
    -   id: end-of-file-fixer
    -   id: trailing-whitespace

-   repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.15
    hooks:
    - id: ruff-check
    - id: ruff-format

-   repo: https://github.com/commitizen-tools/commitizen
    rev: v4.16.2
    hooks:
    -   id: commitizen
        stages: [commit-msg]
