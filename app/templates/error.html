{% extends "base.html" %}

{% block title %}{{ status_code }} – Snipify{% endblock %}

{% block content %}
<div class="min-h-full flex items-center justify-center py-16 px-4">
    <div class="w-full max-w-md text-center">

        <!-- Status code -->
        <p class="text-8xl font-extrabold tracking-tight mb-4" style="color:#EF6C00">{{ status_code }}</p>

        <!-- Title -->
        <h1 class="text-2xl font-bold text-gray-900 dark:text-gray-100 mb-3">{{ title }}</h1>

        <!-- Description -->
        <p class="text-gray-500 dark:text-gray-400 text-sm mb-8 leading-relaxed">{{ description }}</p>

        <!-- CTA -->
        <a href="/"
            class="inline-block px-6 py-3 rounded-lg font-semibold text-white text-sm transition-colors"
            style="background:#EF6C00"
            onmouseover="this.style.background='#D4600A'"
            onmouseout="this.style.background='#EF6C00'">
            Back to home
        </a>

    </div>
</div>
{% endblock %}
